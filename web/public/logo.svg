<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- White lens -->
  <circle cx="41" cy="39" r="33" fill="white"/>

  <!-- Blue airplane: slender fuselage, wide swept wings, no engines -->
  <g fill="#1d4ed8" transform="rotate(45, 41, 39)">
    <!-- Fuselage -->
    <path d="M41,10 C43.5,10 45,17 45,28 L45,53 C45,59 43,64 41,64 C39,64 37,59 37,53 L37,28 C37,17 38.5,10 41,10 Z"/>

    <!-- Right main wing -->
    <path d="M45,31 L69,43 L68,47 L45,41 Z"/>
    <!-- Left main wing -->
    <path d="M37,31 L13,43 L14,47 L37,41 Z"/>

    <!-- Right horizontal stabilizer -->
    <path d="M45,53 L57,57 L56,60 L45,58 Z"/>
    <!-- Left horizontal stabilizer -->
    <path d="M37,53 L25,57 L26,60 L37,58 Z"/>
  </g>

  <!-- Ring (blue) -->
  <circle cx="41" cy="39" r="33" fill="none" stroke="#1d4ed8" stroke-width="4.5"/>

  <!-- Handle (blue) -->
  <line x1="67" y1="64" x2="82" y2="79" stroke="#1d4ed8" stroke-width="7" stroke-linecap="round"/>
</svg>
